# Nginx Proxy Manager — Jellyfin Custom Location Config
# Add as Custom Location under the main proxy host

# Custom Location settings:
# Location: /tv/
# Scheme: http
# Forward Hostname: jellyfin   (Docker container name)
# Forward Port: 8096

# Gear icon → paste these headers:
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto https;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade";
proxy_buffering off;

# After saving, configure Jellyfin base URL:
# Admin Dashboard → Networking → Base URL: /tv
# Save and restart: docker restart jellyfin

# Known issues:
# - HTTP 400 = KnownProxies not set. Fix:
#   docker exec jellyfin sed -i 's|<KnownProxies></KnownProxies>|<KnownProxies>10.56.54.100</KnownProxies>|' /config/config/network.xml
#   docker restart jellyfin
