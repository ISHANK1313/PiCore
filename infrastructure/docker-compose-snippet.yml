version: '3.8'

# Nextcloud Stack — deployed as separate stack in Portainer
# Stack name: nextcloud

services:

  # ── NEXTCLOUD APPLICATION ────────────────────────────────────────────
  nextcloud:
    image: nextcloud
    container_name: nextcloud-app-1
    mem_limit: 400m
    depends_on:
      - nextcloud-db
    environment:
      - MYSQL_HOST=nextcloud-db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=ncuser
      - MYSQL_PASSWORD=CHANGE_ME_STRONG_PASSWORD
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=CHANGE_ME_ADMIN_PASSWORD
      - NEXTCLOUD_TRUSTED_DOMAINS=raspberrypi-1.tail2767bf.ts.net
    volumes:
      - nextcloud_data:/var/www/html
      - /mnt/data/cloud-data:/var/www/html/data
    ports:
      - "8080:80"
    restart: unless-stopped

  # ── MARIADB DATABASE ─────────────────────────────────────────────────
  nextcloud-db:
    image: mariadb:10.6
    container_name: nextcloud-db-1
    mem_limit: 200m
    environment:
      - MYSQL_ROOT_PASSWORD=CHANGE_ME_ROOT_PASSWORD
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=ncuser
      - MYSQL_PASSWORD=CHANGE_ME_STRONG_PASSWORD
    volumes:
      - nextcloud_db:/var/lib/mysql
    restart: unless-stopped

volumes:
  nextcloud_data:
  nextcloud_db:
