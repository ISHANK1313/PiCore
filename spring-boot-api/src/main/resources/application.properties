server.port=8085
spring.application.name=opennas-dashboard

# Proc/sys paths (mounted via Docker volumes)
nas.proc.path=/host/proc
nas.sys.path=/host/sys
nas.data.path=/mnt/data

# vcgencmd cache — refresh every 15 seconds (Pi VideoCore only)
nas.vcgencmd.cache.seconds=15

# Docker container list cache — refresh every 30 seconds
nas.docker.cache.seconds=30

# CORS — allow dashboard frontend to call API from any origin
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,OPTIONS
spring.web.cors.allowed-headers=*

# Actuator (for /api/health)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging — reduce noise on Pi
logging.level.root=WARN
logging.level.com.opennas=INFO
